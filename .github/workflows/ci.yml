name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Production readiness static check
        run: ./scripts/ci-prod-readiness-static.sh

  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
      - name: Shell syntax check
        run: ./scripts/ci-shellcheck.sh
      - name: Repository consistency check
        run: ./scripts/ci-repo-consistency.sh
